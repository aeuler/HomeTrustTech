<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Home Trust Tech</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />

        <style>
            :root {
                --nav-h: 76px;
                --brand-blue: #2563eb;
                --brand-indigo: #4f46e5;
                --ink: #101828;
                --muted: #667085;
            }

            html {
                scroll-behavior: smooth;
            }
            body {
                padding-top: var(--nav-h);
                color: var(--ink);
                background: #fff;
            }

            section[id] {
                scroll-margin-top: calc(var(--nav-h) + 14px);
            }

            .navbar {
                min-height: var(--nav-h);
                backdrop-filter: blur(12px);
                background: rgba(15, 23, 42, 0.96) !important;
            }

            .navbar-logo {
                max-height: 48px;
                width: auto;
                object-fit: contain;
                transition: transform 0.2s ease;
            }

            .navbar-brand:hover .navbar-logo {
                transform: scale(1.04);
            }

            .btn-primary {
                background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
                border: 0;
                box-shadow: 0 10px 24px rgba(37, 99, 235, 0.28);
            }

            .btn-primary:hover {
                filter: brightness(1.05);
                transform: translateY(-1px);
            }

            .btn {
                transition:
                    transform 0.2s ease,
                    box-shadow 0.2s ease;
            }

            .parallax {
                position: relative;
                min-height: 78vh;
                display: grid;
                place-items: center;
                color: #fff;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                overflow: hidden;
            }

            @media (max-width: 991.98px), (prefers-reduced-motion: reduce) {
                .parallax {
                    background-attachment: scroll;
                }
                html {
                    scroll-behavior: auto;
                }
            }

            .parallax::before {
                content: "";
                position: absolute;
                inset: 0;
                background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.38), transparent 36%),
                    linear-gradient(120deg, rgba(2, 6, 23, 0.88), rgba(15, 23, 42, 0.56));
            }

            .parallax > .content {
                position: relative;
                z-index: 1;
            }

            .hero {
                min-height: 88vh;
            }

            .glass {
                backdrop-filter: blur(14px);
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 1.5rem;
                box-shadow: 0 30px 80px rgba(0, 0, 0, 0.28);
            }

            .eyebrow {
                display: inline-flex;
                align-items: center;
                gap: 0.45rem;
                padding: 0.45rem 0.8rem;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.12);
                border: 1px solid rgba(255, 255, 255, 0.18);
                color: rgba(255, 255, 255, 0.86);
                font-size: 0.82rem;
                font-weight: 600;
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }

            .trust-strip {
                margin-top: -34px;
                position: relative;
                z-index: 2;
            }

            .trust-card {
                border: 0;
                border-radius: 1.25rem;
                box-shadow: 0 16px 40px rgba(16, 24, 40, 0.12);
            }

            .feature-icon {
                width: 3.25rem;
                height: 3.25rem;
                display: inline-grid;
                place-items: center;
                border-radius: 1rem;
            }

            .card-hover {
                border: 1px solid rgba(16, 24, 40, 0.08);
                border-radius: 1.35rem;
                transition:
                    transform 180ms ease,
                    box-shadow 180ms ease,
                    border-color 180ms ease;
            }

            .card-hover:hover {
                transform: translateY(-6px);
                box-shadow: 0 22px 50px rgba(16, 24, 40, 0.13);
                border-color: rgba(37, 99, 235, 0.26);
            }

            .section-kicker {
                color: var(--brand-blue);
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-size: 0.78rem;
            }

            .divider {
                height: 1px;
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
            }

            .divider-dark {
                height: 1px;
                background: linear-gradient(90deg, transparent, rgba(16, 24, 40, 0.14), transparent);
            }

            .premium-form {
                border-radius: 1.5rem;
                border: 1px solid rgba(16, 24, 40, 0.08);
                box-shadow: 0 26px 70px rgba(16, 24, 40, 0.14);
            }

            .form-control,
            .form-select {
                border-radius: 0.9rem;
                border-color: #d0d5dd;
            }

            .form-control:focus,
            .form-select:focus {
                border-color: var(--brand-blue);
                box-shadow: 0 0 0 0.25rem rgba(37, 99, 235, 0.12);
            }

            footer a {
                text-decoration: none;
            }

            @media (max-width: 575.98px) {
                .hero h1 {
                    font-size: 2.35rem;
                }
                .navbar-logo {
                    max-height: 42px;
                }
                .trust-strip {
                    margin-top: 0;
                }
            }
        </style>
    </head>

    <body>
        <!-- (ALL CONTENT SAME AS BEFORE...) -->

        <!-- CONTACT SECTION -->
        <section id="contact" class="py-5 bg-light">
            <div class="container py-4">
                <div class="row justify-content-center text-center mb-4">
                    <div class="col-lg-8">
                        <div class="section-kicker mb-2">Contact</div>
                        <h2 class="fw-bold mb-2">Tell us what you need help with.</h2>
                    </div>
                </div>

                <div class="row g-4 align-items-stretch">
                    <div class="col-lg-7">
                        <div class="bg-white premium-form h-100 p-4 p-md-5">
                            <!-- ✅ ONLY CHANGE BELOW -->
                            <form id="contactForm" action="https://formspree.io/f/mvzlkdkl" method="POST">
                                <input type="hidden" name="_subject" value="New Home Trust Tech Lead" />

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <input
                                            name="name"
                                            class="form-control form-control-lg"
                                            placeholder="Name"
                                            required
                                        />
                                    </div>

                                    <div class="col-md-6">
                                        <input
                                            name="email"
                                            type="email"
                                            class="form-control form-control-lg"
                                            placeholder="Email"
                                            required
                                        />
                                    </div>

                                    <div class="col-12">
                                        <textarea
                                            name="message"
                                            class="form-control"
                                            rows="5"
                                            placeholder="Message"
                                            required
                                        ></textarea>
                                    </div>

                                    <div class="col-12">
                                        <button class="btn btn-primary btn-lg rounded-pill px-4">Send Message</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
