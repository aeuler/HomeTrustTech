<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Home Trust Tech</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />

        <style>
            :root {
                --nav-h: 76px;
                --brand-blue: #2563eb;
                --brand-indigo: #4f46e5;
            }

            body {
                padding-top: var(--nav-h);
            }

            .navbar-logo {
                max-height: 48px;
                transition: transform 0.2s ease;
            }
            .navbar-brand:hover .navbar-logo {
                transform: scale(1.05);
            }

            .btn-primary {
                background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
                border: 0;
            }

            .hero {
                min-height: 90vh;
                display: grid;
                place-items: center;
                color: #fff;
                background: url("https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5") center/cover no-repeat;
            }

            .glass {
                backdrop-filter: blur(10px);
                background: rgba(255, 255, 255, 0.1);
                padding: 2rem;
                border-radius: 1.5rem;
            }

            .premium-form {
                border-radius: 1.5rem;
                box-shadow: 0 25px 70px rgba(0, 0, 0, 0.15);
            }
        </style>
    </head>

    <body>
        <!-- NAV -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="hometrustlogo.png" class="navbar-logo me-2" />
                    <span>Home Trust Tech</span>
                </a>

                <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="#services">Services</a></li>
                        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- HERO -->
        <section class="hero text-center">
            <div class="glass">
                <h1 class="display-4 fw-bold">Reliable Tech Help</h1>
                <p class="lead">Setup • Repair • Security</p>
                <a href="#contact" class="btn btn-primary btn-lg rounded-pill px-4">Get Help</a>
            </div>
        </section>

        <!-- SERVICES -->
        <section id="services" class="py-5">
            <div class="container">
                <h2 class="fw-bold mb-4">Services</h2>

                <div class="row g-4">
                    <div class="col-md-4"><div class="card p-4">Security Consulting</div></div>
                    <div class="col-md-4"><div class="card p-4">IT Troubleshooting</div></div>
                    <div class="col-md-4"><div class="card p-4">Setup & Install</div></div>
                </div>
            </div>
        </section>

        <!-- CONTACT -->
        <section id="contact" class="py-5 bg-light">
            <div class="container">
                <div class="row g-4">
                    <div class="col-lg-7">
                        <div class="bg-white premium-form p-5">
                            <form id="contactForm" action="https://formspree.io/f/mvzlkdkl" method="POST">
                                <input type="hidden" name="_subject" value="New Home Trust Tech Lead" />

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <input
                                            name="name"
                                            class="form-control form-control-lg"
                                            placeholder="Name"
                                            required
                                        />
                                    </div>

                                    <div class="col-md-6">
                                        <input
                                            type="email"
                                            name="email"
                                            class="form-control form-control-lg"
                                            placeholder="Email"
                                            required
                                        />
                                    </div>

                                    <div class="col-12">
                                        <textarea
                                            name="message"
                                            class="form-control"
                                            rows="5"
                                            placeholder="Message"
                                            required
                                        ></textarea>
                                    </div>

                                    <div class="col-12">
                                        <button class="btn btn-primary btn-lg rounded-pill px-4">Send Message</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <div class="bg-dark text-white p-5 rounded-4 h-100">
                            <h5>Home Trust Tech</h5>
                            <p>Virginia Beach, VA</p>
                            <p>Email: hometrusttech@gmail.com</p>
                            <p>Phone: (757) 512-8704</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
